# FinanceDataHub 调度配置
# 
# 此文件定义了自动化数据下载和预处理任务的调度规则。
# 支持 cron、interval 两种调度类型。

scheduler:
  timezone: "Asia/Shanghai"
  job_store: "postgresql"         # 任务状态持久化到 PostgreSQL
  max_concurrent_jobs: 3          # 最大并发任务数
  misfire_grace_time: 300         # 错过执行的容忍时间（秒）

jobs:
  # ========== 数据下载任务 ==========
  
  # 日线数据 - 每日收盘后更新（17:00）
  daily_update:
    enabled: true
    type: download
    dataset: daily
    schedule:
      type: cron
      hour: 17
      minute: 0
      day_of_week: "mon-fri"
    params:
      trade_date: "latest"        # 自动获取最新交易日
    retry:
      max_retries: 3
      delay: 300

  # 每日基本面 - 每日收盘后更新（17:30）
  daily_basic_update:
    enabled: true
    type: download
    dataset: daily_basic
    schedule:
      type: cron
      hour: 17
      minute: 30
      day_of_week: "mon-fri"
    params:
      trade_date: "latest"
    depends_on: [daily_update]
    retry:
      max_retries: 3
      delay: 300

  # 复权因子 - 每日更新（17:15）
  adj_factor_update:
    enabled: true
    type: download
    dataset: adj_factor
    schedule:
      type: cron
      hour: 17
      minute: 15
      day_of_week: "mon-fri"
    params:
      trade_date: "latest"
    retry:
      max_retries: 3
      delay: 300

  # 股票基本信息 - 每周一更新（可捕获新上市、退市等变化）
  basic_update:
    enabled: true
    type: download
    dataset: basic
    schedule:
      type: cron
      day_of_week: "mon"
      hour: 7
      minute: 0
    retry:
      max_retries: 3
      delay: 300

  # 财务数据 - 每月1号和15号更新
  financial_update:
    enabled: true
    type: download
    dataset: [fina_indicator, cashflow, balancesheet, income]
    schedule:
      type: cron
      day: "1,15"
      hour: 6
      minute: 0
    retry:
      max_retries: 3
      delay: 600

  # 宏观数据 - 每月15号更新
  macro_update:
    enabled: true
    type: download
    dataset: [gdp, ppi, m, pmi]
    schedule:
      type: cron
      day: 15
      hour: 8
      minute: 0
    retry:
      max_retries: 3
      delay: 600

  # 大盘指数每日指标 - 每日更新（19:30）
  # 注意：Tushare 的指数级别数据通常在收盘后 2-3 小时才完全可用
  index_dailybasic_update:
    enabled: true
    type: download
    dataset: index_dailybasic
    schedule:
      type: cron
      hour: 20
      minute: 30
      day_of_week: "mon-fri"
    params:
      trade_date: "latest"
    retry:
      max_retries: 3
      delay: 600  # 10分钟后重试

  # 申万行业日线 - 每日更新（19:45）
  # 注意：Tushare 的申万行业数据通常在收盘后 2-3 小时才完全可用
  sw_daily_update:
    enabled: true
    type: download
    dataset: sw_daily
    schedule:
      type: cron
      hour: 20
      minute: 45
      day_of_week: "mon-fri"
    params:
      trade_date: "latest"
    retry:
      max_retries: 3
      delay: 600  # 10分钟后重试

  # 申万行业分类 - 每月1号更新
  sw_classify_update:
    enabled: true
    type: download
    dataset: sw_industry_classify
    schedule:
      type: cron
      day: 1
      hour: 7
      minute: 0
    retry:
      max_retries: 3
      delay: 300

  # 申万行业成分股 - 每月1号更新
  sw_member_update:
    enabled: true
    type: download
    dataset: sw_industry_member
    schedule:
      type: cron
      day: 1
      hour: 7
      minute: 30
    depends_on: [sw_classify_update]
    retry:
      max_retries: 3
      delay: 300

  # 交易日历 - 每月1号更新（获取未来一年的交易日历）
  trade_cal_update:
    enabled: true
    type: download
    dataset: trade_cal
    schedule:
      type: cron
      day: 1
      hour: 6
      minute: 30
    retry:
      max_retries: 3
      delay: 300

  # 指数成分权重 - 每月1号更新（沪深300、中证500等）
  index_weight_update:
    enabled: true
    type: download
    dataset: index_weight
    schedule:
      type: cron
      day: 1
      hour: 8
      minute: 30
    retry:
      max_retries: 3
      delay: 300

  # ========== 预处理任务 ==========

  # 技术指标预处理 - 每日运行（18:00）
  # 注意：使用前复权(qfq)，需要全量预处理
  technical_preprocess:
    enabled: true
    type: preprocess
    category: technical
    schedule:
      type: cron
      hour: 18
      minute: 40
      day_of_week: "mon-fri"
    params:
      all: true
      freq: "daily,weekly,monthly"
      adjust: qfq
    depends_on: [daily_update, adj_factor_update]
    retry:
      max_retries: 2
      delay: 600

  # 基本面指标预处理 - 每日运行（18:30）
  # 注意：使用增量方式预处理
  fundamental_preprocess:
    enabled: true
    type: preprocess
    category: fundamental
    schedule:
      type: cron
      hour: 17
      minute: 50
      day_of_week: "mon-fri"
    params:
      all: true
    depends_on: [daily_basic_update]
    retry:
      max_retries: 2
      delay: 600

  # 季度基本面指标预处理 - 每日运行（19:00）
  # 注意：使用增量方式预处理，依赖财务数据更新
  quarterly_fundamental_preprocess:
    enabled: true
    type: preprocess
    category: quarterly_fundamental
    schedule:
      type: cron
      hour: 17
      minute: 45
      day_of_week: "mon-fri"
    params:
      all: true
    depends_on: [financial_update]
    retry:
      max_retries: 2
      delay: 600

  # 行业差异化估值预处理 - 每日运行（18:00）
  # 根据行业配置自动选择核心估值指标（银行用PB、成长股用PEG等）
  # 计算：1. 自身历史分位数  2. 行业内相对分位
  industry_valuation_preprocess:
    enabled: true
    type: preprocess
    category: industry_valuation
    schedule:
      type: cron
      hour: 18
      minute: 0
      day_of_week: "mon-fri"
    params:
      all: true
    depends_on: [fundamental_preprocess]
    retry:
      max_retries: 2
      delay: 600

  # 中国宏观周期预处理 - 每月运行
  # 使用 1 个月生效延迟和 2 个月确认平滑规则，输出月度主表与行业快照
  # 依赖宏观原始数据和最新申万行业成分映射
  macro_cycle_preprocess:
    enabled: true
    type: preprocess
    category: macro_cycle
    schedule:
      type: cron
      day: 15
      hour: 8
      minute: 20
    params:
      all: true
    depends_on: [macro_update, sw_member_update]
    retry:
      max_retries: 2
      delay: 600
